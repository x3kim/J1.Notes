version: '3.8'

services:
  gnotes:
    build: .
    container_name: gnotes
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/data/gnotes.db
      - JWT_SECRET=${JWT_SECRET:-gnotes-secret-change-me}
      - NODE_ENV=production
    volumes:
      - gnotes_data:/data
      - gnotes_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  gnotes_data:
  gnotes_uploads:
