version: '3.8'

services:
  j1notes:
    build: .
    image: j1notes
    container_name: j1notes
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/data/j1notes.db
      - JWT_SECRET=${JWT_SECRET:-CHANGE-ME-IN-PRODUCTION}
      - NODE_ENV=production
    volumes:
      - j1notes_data:/data
      - j1notes_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  collab:
    build: ./hocuspocus-server
    container_name: j1notes-collab
    restart: unless-stopped
    ports:
      - "${COLLAB_PORT:-1234}:1234"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1234"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  j1notes_data:
  j1notes_uploads:
