version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: j1notes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: j1notes
      POSTGRES_USER: j1notes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-j1notes_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U j1notes"]
      interval: 10s
      timeout: 5s
      retries: 5

  j1notes:
    build:
      context: .
      args:
        DATABASE_PROVIDER: postgresql
    image: j1notes
    container_name: j1notes
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://j1notes:${POSTGRES_PASSWORD:-j1notes_password}@postgres:5432/j1notes
      - JWT_SECRET=${JWT_SECRET:-CHANGE-ME-IN-PRODUCTION}
      - NODE_ENV=production
    volumes:
      - j1notes_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  collab:
    build: ./hocuspocus-server
    container_name: j1notes-collab
    restart: unless-stopped
    ports:
      - "${COLLAB_PORT:-1234}:1234"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1234"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  j1notes_uploads:
