version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gnotes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gnotes
      POSTGRES_USER: gnotes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnotes_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnotes"]
      interval: 10s
      timeout: 5s
      retries: 5

  gnotes:
    build:
      context: .
      args:
        DATABASE_PROVIDER: postgresql
    container_name: gnotes
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://gnotes:${POSTGRES_PASSWORD:-gnotes_password}@postgres:5432/gnotes
      - JWT_SECRET=${JWT_SECRET:-gnotes-secret-change-me}
      - NODE_ENV=production
    volumes:
      - gnotes_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  gnotes_uploads:
